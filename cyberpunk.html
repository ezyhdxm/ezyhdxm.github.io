<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>言葉</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Chakra+Petch:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/cyberpunk.css">
    <script src="js/lyrics-loader.js"></script>
    <script src="js/cyber.js" defer></script>
</head>
<body class="fade-in">

    <div class="video-bg" id="videoBg">
        <iframe id="bgVideo" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <canvas id="matrixCanvas"></canvas>

    <div class="crt-overlay">
        <div class="crt-scanlines"></div>
        <div class="crt-vignette"></div>
        <div class="crt-flicker"></div>
    </div>

    <h1 class="general-text glitch-text">サイバーパンク世界へようこそ</h1>
    <p class="general-text glitch-text">これは現実ではない。あなたは今、データの夢を見ている。</p>
    <p class="general-text glitch-text">ネットの彼方に、真実が待っている。</p>

    <div class="terminal">
        <span class="commandline-text glitch-text">ERROR: Data Corrupted...</span>
        <span class="commandline-text glitch-text">root@localhost:~# rm -rf /</span>
    </div>

    <div class="poem glitch-text" id="poem">
        <div class="text hiragana" id="hiragana"> </div>
        <div class="text original" id="original">
            あまりにも馴染みのある言葉は詩的な味わいを失い...
        </div>
        <div class="song-title" id="song-title"></div>
        <div class="translation" id="translation"></div>
    </div>

    <div class="black-screen" id="blackScreen"></div>

    <div class="time-display glitch-text" id="timeDisplay">Loading time...</div>

    <button class="broadcast-btn" id="broadcastBtn">▶ Broadcast</button>

    <script src="js/cyberpunk.js"></script>

</body>
</html>
