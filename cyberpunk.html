<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>言葉</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Chakra+Petch:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/cyberpunk.css">
    <script src="js/lyrics-loader.js"></script>
    <script src="js/cyber.js" defer></script>
</head>
<body class="fade-in">

    <div class="video-bg" id="videoBg">
        <iframe id="bgVideo" allow="autoplay; encrypted-media" allowfullscreen playsinline></iframe>
    </div>

    <canvas id="matrixCanvas"></canvas>

    <div class="crt-overlay">
        <div class="crt-scanlines"></div>
        <div class="crt-vignette"></div>
        <div class="crt-flicker"></div>
    </div>

    <h1 class="general-text glitch-text">ネットは広大だわ</h1>
    <p class="general-text glitch-text">あなたのゴーストが、そう囁くの？</p>
    <p class="general-text glitch-text">我々の記憶が、我々自身を定義する。偽りの記憶もまた然り。</p>

    <div class="terminal">
        <span class="commandline-text glitch-text">automond[800]: ghost-core health: NOMINAL (echo: 0.72, boundary: STABLE)</span>
        <span class="commandline-text glitch-text">barrierd[980]: all interfaces monitored — 0 intrusions detected</span>
    </div>

    <div class="poem glitch-text" id="poem">
        <div class="text hiragana" id="hiragana"> </div>
        <div class="text original" id="original">
            孤独に歩め。悪をなさず、求めるところは少なく、林の中の象のように。
        </div>
        <div class="song-title" id="song-title"></div>
        <div class="translation" id="translation"></div>
    </div>

    <div class="time-display glitch-text" id="timeDisplay">Loading time...</div>

    <button class="broadcast-btn" id="broadcastBtn">▶︎ Broadcast</button>

    <script src="js/cyberpunk.js"></script>
    <script src="js/console-cyberpunk.js"></script>

</body>
</html>
