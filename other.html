<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>言葉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400;500&family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/other.css">
    <script src="js/lyrics-loader.js"></script>
    <script src="js/lyrics.js" defer></script>
</head>
<body class="fade-in">

    <div class="time-display" id="timeDisplay">Loading time...</div>

    <button class="mode-toggle" id="modeToggle">昼</button>

    <button class="playlist-toggle" id="playlistToggle" aria-label="Playlist">♪</button>
    <div class="playlist-panel" id="playlistPanel">
        <ul id="playlistList"></ul>
    </div>

    <div class="tv" id="tv">
        <div class="pomo" id="pomo">
            <span class="pomo-time" id="pomoTime">25:00</span>
            <button class="pomo-btn" id="pomoStartPause" aria-label="Start/Pause">▶</button>
            <button class="pomo-btn" id="pomoReset" aria-label="Reset">↺</button>
        </div>
        <div class="tv-body">
            <div class="tv-screen">
                <canvas id="tvNoise"></canvas>
                <iframe id="videoFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                <div class="tv-crt">
                    <div class="tv-scanlines"></div>
                    <div class="tv-vignette"></div>
                    <div class="tv-flicker"></div>
                </div>
            </div>
            <div class="tv-controls">
                <span class="tv-label">YORUSHIKA</span>
                <button class="tv-filter-btn" id="tvFilter" aria-label="Lo-fi filter">Lo-Fi</button>
                <button class="tv-power" id="tvPower" aria-label="Power"></button>
            </div>
        </div>
    </div>

    <div class="container" id="quote">
        <div class="text hiragana" id="hiragana"> </div>
        <div class="text original" id="original">
            ヨルシカ
        </div>
        <div class="song-title" id="song-title">—</div>
        <div class="translation" id="translation">（点击）</div>
    </div>

    <script src="js/other.js"></script>

</body>
</html>
