<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <title>Hao's Homepage</title>
        <link rel="icon" type="image/svg+xml" href="favicon.svg">
        <link rel="stylesheet" type="text/css" href="css/main.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Poiret+One&display=swap" rel="stylesheet">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.1.9/p5.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
        <script src="vendor/vanta.trunk.min.js"></script>
        <script src="js/background.js" defer></script>
        <script src="js/lamp.js" defer></script>
    </head>
    <body class="is-preloaded">
        <svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden">
            <filter id="grav-lens">
                <feTurbulence type="turbulence" baseFrequency="0.02 0.015" numOctaves="3" seed="5" result="warp">
                    <animate attributeName="baseFrequency" values="0.02 0.015;0.025 0.02;0.02 0.015" dur="8s" repeatCount="indefinite"/>
                </feTurbulence>
                <feDisplacementMap in="SourceGraphic" in2="warp" scale="12" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
        </svg>
        <div id="vanta-background"></div>

        <header id="header" class="site-header" role="banner">
            <div class="wrapper">
                <a class="site-title" href="index.html">Hao's Homepage</a>
            </div>
        </header>

        <button id="indexModeToggle" aria-label="Toggle day/night mode"> </button>

        <div id="lamp-container">
            <div id="lamp-string"></div>
            <div id="lamp-bulb"></div>
            <div id="lamp-light"></div>
        </div>

        <div id="main">
            <a href="https://ezyhdxm.github.io/hao-blog/" data-text="Blogs" class="fade-button">
                <div class="lens-warp"></div>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                Blogs
            </a>
            <a href="https://ezyhdxm.github.io/academic-site/" data-text="Publications" class="fade-button">
                <div class="lens-warp"></div>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                Publications
            </a>
            <a href="other.html" id="otherLink" data-text="Others" class="fade-button">
                <div class="lens-warp"></div>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                Others
            </a>
        </div>

        <script>
            const pages = [
                { url: "other.html", probability: 0.8 },
                { url: "cyberpunk.html", probability: 0.2 },
            ];

            function getRandomPage() {
                let rand = Math.random();
                let cumulative = 0;
                for (let page of pages) {
                    cumulative += page.probability;
                    if (rand < cumulative) return page.url;
                }
                return pages[0].url;
            }

            document.getElementById("otherLink").addEventListener("click", function(event) {
                event.preventDefault();
                document.body.classList.add("fade-out");
                setTimeout(() => {
                    window.location.href = getRandomPage();
                }, 500);
            });
        </script>
    </body>
</html>
